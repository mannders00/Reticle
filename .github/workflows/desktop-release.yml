# Desktop release builds — free GitHub-hosted runners, all three platforms.
#
# Cut a release by pushing a version tag to this repo:
#   git tag v0.1.0 && git push origin v0.1.0
# (from the internal repo: `make release-oss VERSION=0.1.0`)
#
# tauri-action builds the bundles and attaches them to ONE GitHub Release
# for the tag, so the repo sidebar's "Releases" shows a tidy download list:
#   macOS   .dmg           (Apple Silicon + Intel)
#   Linux   .AppImage/.deb/.rpm (x86_64)
#   Windows .msi/.exe      (x86_64; terminals not supported there yet)

name: desktop-release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest        # arm64 (Apple Silicon)
            target: aarch64-apple-darwin
          - platform: macos-latest        # x86_64 (Intel) — cross from arm64
            target: x86_64-apple-darwin
          - platform: ubuntu-22.04        # x86_64 AppImage/deb/rpm
            target: x86_64-unknown-linux-gnu
          - platform: windows-latest      # x86_64 msi/nsis
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Linux system deps (webkit2gtk et al.)
        if: startsWith(matrix.platform, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev \
            librsvg2-dev patchelf libgtk-3-dev

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - uses: oven-sh/setup-bun@v2
      - run: bun install

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: --target ${{ matrix.target }}
          tagName: ${{ github.ref_name }}
          releaseName: "Reticle ${{ github.ref_name }}"
          releaseDraft: false
          prerelease: false
          releaseBody: |
            ## Downloads

            | Platform | File |
            |---|---|
            | **macOS** (Apple Silicon) | `Reticle_*_aarch64.dmg` |
            | **macOS** (Intel) | `Reticle_*_x64.dmg` |
            | **Linux** (x86_64) | `Reticle_*_amd64.AppImage` · `.deb` · `.rpm` |
            | **Windows** (x86_64) | `Reticle_*_x64-setup.exe` · `.msi` |

            macOS builds are unsigned for now — right-click → Open the first
            time (or `xattr -dr com.apple.quarantine Reticle.app`).
            Windows: interactive SSH terminals aren't supported yet;
            actions, checks, health, and PDF export all work.

            The **team daemon** (shared live map for your whole org) is at
            https://reticle.live.
