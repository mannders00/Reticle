# Reticle sample — GCP GKE production
# Cloud DNS → global HTTPS LB (with Cloud CDN) → GKE ingress → API/web
# deployments, backed by Cloud SQL and Memorystore. Region → VPC →
# subnets nesting, kubectl specs on the cluster objects.
version: 1
nodes:
  cloud-dns:
    id: cloud-dns
    kind: dns
    title: cloud-dns
    subtitle: "api.example.io"
    x: 60
    y: 80
    w: 160
    h: 100
    actions:
      - { name: resolve, script: "dig +short api.example.io" }

  glb:
    id: glb
    kind: load-balancer
    title: global-lb
    subtitle: "HTTPS · anycast VIP"
    x: 60
    y: 260
    w: 220
    h: 120
    notes: "One anycast IP worldwide. Cert via Google-managed SSL; renewals are Google's problem."

  cloud-cdn:
    id: cloud-cdn
    kind: cdn
    title: cloud-cdn
    subtitle: "attached to LB"
    x: 60
    y: 460
    w: 180
    h: 140
    notes: "Cache mode: USE_ORIGIN_HEADERS. The API sets Cache-Control very deliberately — keep it that way."

  gcs-uploads:
    id: gcs-uploads
    kind: object-store
    title: gcs-uploads
    subtitle: "user uploads · EU"
    x: 60
    y: 660
    w: 180
    h: 140
    notes: "Signed URLs only, 15-min expiry. Uniform bucket-level access — no per-object ACL archaeology."

  region-euw1:
    id: region-euw1
    kind: region
    title: europe-west1
    subtitle: "production"
    x: 320
    y: 40
    w: 1200
    h: 880

  vpc-prod:
    id: vpc-prod
    kind: vpc
    title: prod-vpc
    subtitle: "10.10.0.0/16"
    x: 360
    y: 120
    w: 1120
    h: 760
    parentId: region-euw1

  subnet-gke:
    id: subnet-gke
    kind: subnet
    title: gke
    subtitle: "10.10.0.0/20"
    x: 400
    y: 200
    w: 740
    h: 420
    parentId: vpc-prod

  gke-prod:
    id: gke-prod
    kind: cluster
    title: gke-prod
    subtitle: "1.30 · 6 nodes · 2 pools"
    x: 440
    y: 280
    w: 280
    h: 180
    parentId: subnet-gke
    spec: { kubeContext: gke-prod, namespace: default, name: gke-prod }
    notes: |
      Autopilot off; node pools: default (e2-standard-4) + burst (spot).
      Spot pool drains happen — anything stateful is banned from it.
    actions:
      - { name: nodes, script: "kubectl get nodes -o wide" }
      - { name: pending pods, script: "kubectl get pods -A --field-selector status.phase=Pending" }

  ingress-gke:
    id: ingress-gke
    kind: ingress
    title: gke-ingress
    subtitle: "gce class · NEGs"
    x: 780
    y: 280
    w: 160
    h: 100
    parentId: subnet-gke
    spec: { kubeContext: gke-prod, namespace: prod, name: main-ingress }

  dep-api:
    id: dep-api
    kind: deployment
    title: api
    subtitle: "6 pods · go"
    x: 740
    y: 440
    w: 180
    h: 120
    parentId: subnet-gke
    spec: { kubeContext: gke-prod, namespace: prod, name: api }
    notes: "HPA 4-12 on p95 latency. If it's pinned at 12, the DB is the bottleneck, not the API."

  dep-web:
    id: dep-web
    kind: deployment
    title: web
    subtitle: "3 pods · next.js"
    x: 940
    y: 440
    w: 180
    h: 120
    parentId: subnet-gke
    spec: { kubeContext: gke-prod, namespace: prod, name: web }

  subnet-data:
    id: subnet-data
    kind: subnet
    title: data
    subtitle: "10.10.16.0/20 · PSA"
    x: 400
    y: 640
    w: 740
    h: 220
    parentId: vpc-prod

  cloud-sql:
    id: cloud-sql
    kind: database
    title: cloud-sql
    subtitle: "postgres 16 · HA"
    x: 440
    y: 700
    w: 180
    h: 140
    parentId: subnet-data
    spec: { host: 10.10.16.5, port: 5432, user: postgres }
    notes: "Regional HA (automatic failover). Connections via cloud-sql-proxy sidecars only."

  memorystore:
    id: memorystore
    kind: cache
    title: memorystore
    subtitle: "redis 7 · 5GB"
    x: 680
    y: 700
    w: 160
    h: 140
    parentId: subnet-data
    spec: { host: 10.10.16.9, port: 6379, user: ops }

edges:
  e-dns-lb:
    id: e-dns-lb
    kind: routes-to
    label: "A"
    from: cloud-dns
    to: glb
  e-lb-cdn:
    id: e-lb-cdn
    kind: depends-on
    label: "cache"
    from: glb
    to: cloud-cdn
  e-lb-ing:
    id: e-lb-ing
    kind: https
    label: "443 · NEG"
    from: glb
    to: ingress-gke
  e-ing-api:
    id: e-ing-api
    kind: routes-to
    label: "/api/*"
    from: ingress-gke
    to: dep-api
  e-ing-web:
    id: e-ing-web
    kind: routes-to
    label: "/*"
    from: ingress-gke
    to: dep-web
  e-api-sql:
    id: e-api-sql
    kind: tcp
    label: "5432"
    from: dep-api
    to: cloud-sql
  e-api-redis:
    id: e-api-redis
    kind: tcp
    label: "6379"
    from: dep-api
    to: memorystore
  e-api-gcs:
    id: e-api-gcs
    kind: https
    label: "signed PUT"
    from: dep-api
    to: gcs-uploads

groups: []
layers: []
