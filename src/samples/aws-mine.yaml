# Reticle sample — the infra serving reticle.live itself
#
# This is the topology behind the public demo: Cloudflare in front,
# two EC2 boxes in us-east-2 — the xlarge workhorse serving the site
# and the go services, and the t3.micro running the very daemon that
# streams this map to you. HTTP crons hit the real public endpoints,
# local crons run on the demo box itself, so the map is green (or
# honestly red) the moment the daemon starts.
#
# Before pointing the demo daemon at this file:
#   - set host-main's spec.host to the workhorse's private VPC IP
#     (and open its SG to the demo box) to light up SSH actions + TCP health
#   - everything else works with zero config
version: 1
nodes:
  cloudflare:
    id: cloudflare
    kind: cdn
    title: cloudflare
    subtitle: "DNS · proxy · edge TLS"
    x: 60
    y: 240
    w: 180
    h: 140
    notes: "Orange-cloud on the site, grey-cloud on demo (Caddy owns that cert). 525s mean the origin cert story broke again."
    addons:
      - { kind: cert, label: "universal SSL" }
    actions:
      - { name: resolve site, exec: local, script: "dig +short reticle.live" }
      - { name: resolve demo, exec: local, script: "dig +short demo.reticle.live" }
      - { name: edge headers, exec: local, script: "curl -sI https://reticle.live | head -8" }
    crons:
      - { name: site edge, interval: 60s, exec: http, url: "https://reticle.live", status: "200" }
      - { name: demo edge, interval: 60s, exec: http, url: "https://demo.reticle.live", status: "200" }

  note-meta:
    id: note-meta
    kind: note
    title: you are here
    x: 40
    y: 460
    w: 240
    h: 180
    notes: |
      Everything on this map is the real infrastructure serving reticle.live — including the daemon streaming you this view, on the t3.micro below. Health pills are live checks, not decoration. This whole map is one topology.yaml in git.

  region-use2:
    id: region-use2
    kind: region
    title: us-east-2
    subtitle: "production"
    x: 340
    y: 40
    w: 1160
    h: 840

  box-main:
    id: box-main
    kind: box
    title: main-ec2
    subtitle: "c5.xlarge · the workhorse"
    x: 400
    y: 120
    w: 640
    h: 400
    parentId: region-use2

  host-main:
    id: host-main
    kind: vm
    title: host
    subtitle: "debian · elastic IP"
    x: 440
    y: 200
    w: 200
    h: 120
    parentId: box-main
    # ← set to the workhorse's private VPC IP + allow the demo box's SG
    spec: { host: 172.31.0.10, port: 22, user: admin }
    notes: "Everything I run lives here behind one Caddy — the site, the go services, the docker strays. Snapshot before kernel updates; there is no second workhorse."
    addons:
      - { kind: cpu, label: "4 vCPU" }
      - { kind: ram, label: "16G" }
      - { kind: disk, label: "gp3 120G" }
    actions:
      - { name: load, script: "uptime" }
      - { name: disk, script: "df -h /" }
      - { name: services, script: "systemctl list-units --type=service --state=running | head -25" }

  caddy-main:
    id: caddy-main
    kind: gateway
    title: caddy
    subtitle: "TLS · systemd"
    x: 740
    y: 200
    w: 200
    h: 120
    parentId: box-main
    notes: "One Caddyfile fronts everything: file_server for the site, reverse_proxy per service. caddy validate before reload, always."
    addons:
      - { kind: cert, label: "auto via ACME" }
    actions:
      - { name: status, script: "systemctl status caddy --no-pager -l" }
      - { name: recent logs, script: "journalctl -u caddy -n 40 --no-pager" }
      - { name: validate config, script: "caddy validate --config /etc/caddy/Caddyfile" }
    crons:
      - { name: site up, interval: 60s, exec: http, url: "https://reticle.live", status: "200" }

  site:
    id: site
    kind: service
    title: reticle-site
    subtitle: "static · file_server"
    x: 440
    y: 380
    w: 200
    h: 100
    parentId: box-main
    notes: "Plain files in /home/admin/reticle/web. Deploys are an rsync — no build step, no pipeline, nothing to page about."
    actions:
      - { name: what's deployed, script: "ls -la /home/admin/reticle/web" }

  go-svcs:
    id: go-svcs
    kind: container
    title: go services
    subtitle: "systemd · docker"
    x: 740
    y: 380
    w: 200
    h: 100
    parentId: box-main
    notes: "Each micro-service is a single static binary + a systemd unit, listening on its own localhost port. Caddy is the only thing exposed."
    actions:
      - { name: containers, script: "docker ps --format 'table {{.Names}}\\t{{.Status}}'" }
      - { name: listening ports, script: "ss -tlnp | grep 127.0.0.1" }

  box-demo:
    id: box-demo
    kind: box
    title: demo-ec2
    subtitle: "t3.micro · you are here"
    x: 400
    y: 580
    w: 640
    h: 260
    parentId: region-use2

  caddy-demo:
    id: caddy-demo
    kind: gateway
    title: caddy
    subtitle: "TLS · systemd"
    x: 440
    y: 660
    w: 200
    h: 120
    parentId: box-demo
    notes: "Two-line Caddyfile: demo.reticle.live → 127.0.0.1:8788. Grey-cloud DNS so Caddy can hold the cert itself."
    actions:
      - { name: status, exec: local, script: "systemctl status caddy --no-pager -l" }
      - { name: recent logs, exec: local, script: "journalctl -u caddy -n 40 --no-pager" }
    crons:
      - { name: caddy active, interval: 60s, exec: local, script: "systemctl is-active caddy" }

  daemon:
    id: daemon
    kind: server
    title: reticle-daemon
    subtitle: "this very process"
    x: 740
    y: 660
    w: 240
    h: 120
    parentId: box-demo
    spec: { host: 127.0.0.1, port: 22, user: admin, local: true }
    notes: "The 3.7MB binary streaming you this page — UI embedded, viewer token only, no terminal flag. Blast radius of a public demo: one $8 box."
    addons:
      - { kind: cpu, label: "2 vCPU" }
      - { kind: ram, label: "1G" }
      - { kind: misc, label: "~$8/mo" }
    actions:
      - { name: load, exec: local, script: "uptime" }
      - { name: disk, exec: local, script: "df -h /" }
      - { name: memory, exec: local, script: "free -m" }
    crons:
      - { name: disk < 85%, interval: 5m, exec: local, script: "test $(df / --output=pcent | tail -1 | tr -dc 0-9) -lt 85" }
      - { name: full loop, interval: 60s, exec: http, url: "https://demo.reticle.live", status: "200" }

edges:
  e-cf-main:
    id: e-cf-main
    kind: https
    label: "443"
    from: cloudflare
    to: caddy-main
  e-cf-demo:
    id: e-cf-demo
    kind: https
    label: "443"
    from: cloudflare
    to: caddy-demo
  e-caddy-site:
    id: e-caddy-site
    kind: fanout
    label: "file_server"
    from: caddy-main
    to: site
  e-caddy-svcs:
    id: e-caddy-svcs
    kind: fanout
    label: "reverse_proxy"
    from: caddy-main
    to: go-svcs
  e-caddy-daemon:
    id: e-caddy-daemon
    kind: fanout
    label: ":8788"
    from: caddy-demo
    to: daemon
  e-daemon-host:
    id: e-daemon-host
    kind: tunnel
    label: "ssh · vpc"
    from: daemon
    to: host-main

groups: []
layers: []
