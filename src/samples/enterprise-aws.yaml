# Reticle sample — AWS three-tier production
# Route 53 → CloudFront → ALB in a public subnet, an app tier, and an
# RDS primary/replica pair — nested region → VPC → subnets, with a
# bastion tunnel for operators and crons watching the tiers.
version: 1
nodes:
  route53:
    id: route53
    kind: dns
    title: route53
    subtitle: "app.example.com"
    x: 60
    y: 80
    w: 160
    h: 100
    # Nothing to SSH into — actions run locally on the daemon host with
    # its AWS creds. `dig` from the daemon's own vantage point.
    notes: "ALIAS to CloudFront. TTL 60 — cutovers propagate fast, typos propagate faster."
    actions:
      - { name: resolve, exec: local, script: "dig +short app.example.com" }
      - { name: record set, exec: local, script: "aws route53 list-resource-record-sets --hosted-zone-id $ZONE --query 'ResourceRecordSets[?Name==`app.example.com.`]'" }

  cloudfront:
    id: cloudfront
    kind: cdn
    title: cloudfront
    subtitle: "TLS · edge cache"
    x: 60
    y: 260
    w: 180
    h: 140
    # The edge itself is the health signal — an http check on the app.
    notes: "Static under /assets/* cached 24h; everything else passes through to the ALB."
    actions:
      - { name: edge check, exec: local, script: "curl -sI https://app.example.com | head -8" }
    crons:
      - { name: edge healthy, interval: 60s, exec: http, url: "https://app.example.com/healthz", status: "2xx", jq: '.status == "ok"' }

  s3-assets:
    id: s3-assets
    kind: object-store
    title: s3-assets
    subtitle: "static + uploads"
    x: 60
    y: 480
    w: 180
    h: 140
    # Managed — no host. Local-exec AWS CLI on the daemon.
    notes: "Versioning on. Lifecycle: uploads → IA after 30d. Never public — CloudFront OAC only."
    actions:
      - { name: bucket size, exec: local, script: "aws s3 ls --summarize --recursive s3://app-assets | tail -2" }
    crons:
      - { name: bucket reachable, interval: 5m, exec: local, script: "aws s3api head-bucket --bucket app-assets" }

  region-use1:
    id: region-use1
    kind: region
    title: us-east-1
    subtitle: "production"
    x: 320
    y: 40
    w: 1240
    h: 880

  vpc-prod:
    id: vpc-prod
    kind: vpc
    title: vpc-prod
    subtitle: "10.0.0.0/16"
    x: 360
    y: 120
    w: 1160
    h: 760
    parentId: region-use1
    notes: "Flow logs → s3. Peered to vpc-tools (not drawn) for CI runners."

  subnet-public:
    id: subnet-public
    kind: subnet
    title: public
    subtitle: "10.0.1.0/24 · IGW"
    x: 400
    y: 200
    w: 540
    h: 260
    parentId: vpc-prod

  alb:
    id: alb
    kind: load-balancer
    title: alb-prod
    subtitle: "443 → app:8080"
    x: 440
    y: 280
    w: 220
    h: 120
    parentId: subnet-public
    spec: { host: 10.0.1.10, port: 443, user: ec2-user }
    notes: "Health check: GET /healthz, 2×5s. Deregistration delay 30s — deploys drain fast."
    crons:
      - { name: app healthy, interval: 30s, exec: http, url: "https://app.example.com/healthz", status: "200", jq: '.db == "up"' }

  bastion:
    id: bastion
    kind: bastion
    title: bastion
    subtitle: "SSM + ssh · t4g.nano"
    x: 720
    y: 280
    w: 180
    h: 120
    parentId: subnet-public
    spec: { host: 10.0.1.5, port: 22, user: ec2-user }
    notes: |
      The only SSH ingress. DB access: ssh -L 5432:rds-primary:5432 bastion.
      Sessions are logged; don't be interesting.
    actions:
      - { name: who is on, script: "who" }
      - { name: recent logins, script: "last -n 20" }
    crons:
      - { name: sshd alive, interval: 60s, script: "systemctl is-active sshd" }

  elasticache:
    id: elasticache
    kind: cache
    title: elasticache
    subtitle: "redis 7 · sessions"
    x: 1080
    y: 280
    w: 160
    h: 140
    parentId: vpc-prod
    spec: { host: 10.0.4.10, port: 6379, user: ec2-user }
    notes: "Session store + hot config. Data is disposable; latency is not."

  subnet-app:
    id: subnet-app
    kind: subnet
    title: app
    subtitle: "10.0.2.0/24 · private"
    x: 400
    y: 540
    w: 540
    h: 280
    parentId: vpc-prod

  web-1:
    id: web-1
    kind: server
    title: web-1
    subtitle: "asg · c7g.large"
    x: 440
    y: 620
    w: 220
    h: 120
    parentId: subnet-app
    spec: { host: 10.0.2.11, port: 22, user: ec2-user }
    notes: "Immutable AMI, app in /srv/app. Instances are cattle — fix the AMI, not the box."
    actions:
      - { name: app logs, script: "journalctl -u app -n 80 --no-pager" }
      - { name: health endpoint, script: "curl -s localhost:8080/healthz" }
      - { name: running version, script: "cat /srv/app/RELEASE" }
    crons:
      - { name: app alive, interval: 30s, script: "systemctl is-active app" }
      - { name: disk < 85%, interval: 5m, script: "test $(df / --output=pcent | tail -1 | tr -dc 0-9) -lt 85" }

  web-2:
    id: web-2
    kind: server
    title: web-2
    subtitle: "asg · c7g.large"
    x: 700
    y: 620
    w: 220
    h: 120
    parentId: subnet-app
    spec: { host: 10.0.2.12, port: 22, user: ec2-user }
    actions:
      - { name: app logs, script: "journalctl -u app -n 80 --no-pager" }
      - { name: health endpoint, script: "curl -s localhost:8080/healthz" }
    crons:
      - { name: app alive, interval: 30s, script: "systemctl is-active app" }

  subnet-data:
    id: subnet-data
    kind: subnet
    title: data
    subtitle: "10.0.3.0/24 · private"
    x: 1000
    y: 540
    w: 480
    h: 280
    parentId: vpc-prod

  rds-primary:
    id: rds-primary
    kind: database
    title: rds-primary
    subtitle: "postgres 16 · r7g.xl"
    x: 1040
    y: 620
    w: 180
    h: 160
    parentId: subnet-data
    spec: { host: 10.0.3.10, port: 5432, user: ec2-user }
    notes: |
      Multi-AZ off (replica is our failover). PITR 7 days.
      Failover runbook: promote replica, flip app SSM param, restart app.
    actions:
      - { name: connections, script: "psql -h localhost -U postgres -c 'select count(*) from pg_stat_activity'" }

  rds-replica:
    id: rds-replica
    kind: database
    title: rds-replica
    subtitle: "read replica · reports"
    x: 1280
    y: 620
    w: 180
    h: 160
    parentId: subnet-data
    spec: { host: 10.0.3.11, port: 5432, user: ec2-user }
    notes: "Reporting reads only. If lag > 60s the nightly exports will be wrong."

edges:
  e-dns-cf:
    id: e-dns-cf
    kind: routes-to
    label: "ALIAS"
    from: route53
    to: cloudfront
  e-cf-alb:
    id: e-cf-alb
    kind: https
    label: "443"
    from: cloudfront
    to: alb
  e-cf-s3:
    id: e-cf-s3
    kind: http
    label: "/assets/*"
    from: cloudfront
    to: s3-assets
  e-alb-w1:
    id: e-alb-w1
    kind: fanout
    label: ":8080"
    from: alb
    to: web-1
  e-alb-w2:
    id: e-alb-w2
    kind: fanout
    label: ":8080"
    from: alb
    to: web-2
  e-w1-db:
    id: e-w1-db
    kind: tcp
    label: "5432"
    from: web-1
    to: rds-primary
  e-w2-db:
    id: e-w2-db
    kind: tcp
    label: "5432"
    from: web-2
    to: rds-primary
  e-w1-redis:
    id: e-w1-redis
    kind: tcp
    label: "6379"
    from: web-1
    to: elasticache
  e-w2-redis:
    id: e-w2-redis
    kind: tcp
    label: "6379"
    from: web-2
    to: elasticache
  e-repl:
    id: e-repl
    kind: replication
    label: "streaming"
    from: rds-primary
    to: rds-replica
  e-bastion-db:
    id: e-bastion-db
    kind: tunnel
    label: "ssh -L 5432"
    from: bastion
    to: rds-primary

groups: []
layers: []
